# _config.yml
# GitHub Pages configuration for Kapardhi Foods

# Site settings
title: Home - Kapardhi foods
description: Premium natural snacks crafted with love & nature's finest. Pure, wholesome, and delicious.
baseurl: "" 
url: "https://Kapardhifoods.in"

# IMPORTANT: Disable Jekyll plugins that might cause errors
plugins: []
exclude:
  - .gitignore
  - README.md
  - LICENSE
  - .jekyll-cache
  - .nojekyll

# These settings help avoid build errors
markdown: kramdown
theme: null
safe: true
